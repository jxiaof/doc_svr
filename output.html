<script>
	(function() {
		
		const themeToggle = document.querySelector("[data-theme-toggle]");
		const storageThemeKey = "doc-svr-theme";
		const storageViewKey = "doc-svr-home-view";
		
		function initTheme() {
			const savedTheme = localStorage.getItem(storageThemeKey);
			const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
			const theme = savedTheme || (prefersDark ? "dark" : "light");
			applyTheme(theme);
		}
		
		function applyTheme(theme) {
			if (theme === "dark") {
				document.documentElement.setAttribute("data-theme", "dark");
				document.documentElement.style.colorScheme = "dark";
			} else {
				document.documentElement.removeAttribute("data-theme");
				document.documentElement.style.colorScheme = "light";
			}
			try {
				localStorage.setItem(storageThemeKey, theme);
			} catch (error) {
				
			}
		}
		
		function toggleTheme() {
			const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
			const newTheme = currentTheme === "dark" ? "light" : "dark";
			applyTheme(newTheme);
		}
		
		if (themeToggle) {
			themeToggle.addEventListener("click", toggleTheme);
		}
		
		
		window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
			const savedTheme = localStorage.getItem(storageThemeKey);
			if (!savedTheme) {
				applyTheme(e.matches ? "dark" : "light");
			}
		});
		
		initTheme();
		
		
		const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
		const root = document.querySelector(".home-library");
		const grid = document.querySelector("[data-bookshelf-grid]");
		const links = document.querySelectorAll("[data-shelf-link]");
		const searchInput = document.querySelector("[data-home-search-input]");
		const searchClear = document.querySelector("[data-home-search-clear]");
		const status = document.querySelector("[data-library-status]");
		const count = document.querySelector("[data-library-count]");
		const empty = document.querySelector("[data-search-empty]");
		const cards = Array.from(document.querySelectorAll("[data-search-target]"));
		const placeholders = Array.from(document.querySelectorAll(".bookshelf-slot.is-placeholder"));
		const toggleButtons = Array.from(document.querySelectorAll("[data-view-mode]"));
		let isLeaving = false;

		function normalize(value) {
			return (value || "").toLowerCase().replace(/[\s_\-/]+/g, "");
		}

		function fuzzyMatch(query, candidate) {
			if (!query) {
				return true;
			}
			if (candidate.includes(query)) {
				return true;
			}
			let queryIndex = 0;
			for (const character of candidate) {
				if (character === query[queryIndex]) {
					queryIndex += 1;
					if (queryIndex === query.length) {
						return true;
					}
				}
			}
			return false;
		}

		function updateSearchResults() {
			if (!root || !grid) {
				return;
			}

			const query = normalize(searchInput ? searchInput.value : "");
			let visibleCount = 0;
			let firstVisibleLink = null;

			cards.forEach((card) => {
				const matches = fuzzyMatch(query, normalize(card.dataset.searchText || ""));
				card.hidden = !matches;
				if (matches) {
					visibleCount += 1;
					if (!firstVisibleLink) {
						firstVisibleLink = card.querySelector("[data-shelf-link]");
					}
				}
			});

			placeholders.forEach((placeholder) => {
				placeholder.hidden = Boolean(query) || grid.dataset.view === "list";
			});

			if (status) {
				status.textContent = query ? "找到 " + visibleCount + " 个匹配" : cards.length + " 个已注册入口";
			}
			if (count) {
				count.textContent = String(query ? visibleCount : cards.length);
			}
			if (empty) {
				empty.hidden = !query || visibleCount > 0;
			}
			if (searchClear) {
				searchClear.hidden = !query;
			}
			root.dataset.searchState = query ? (visibleCount > 0 ? "active" : "empty") : "idle";
			grid.dataset.firstVisibleHref = firstVisibleLink ? firstVisibleLink.getAttribute("href") || "" : "";
		}

		function applyView(mode) {
			if (!root || !grid) {
				return;
			}
			grid.dataset.view = mode;
			root.dataset.view = mode;
			placeholders.forEach((placeholder) => {
				placeholder.hidden = mode === "list" || Boolean(searchInput && searchInput.value);
			});
			toggleButtons.forEach((button) => {
				const active = button.dataset.viewMode === mode;
				button.classList.toggle("is-active", active);
				button.setAttribute("aria-pressed", active ? "true" : "false");
			});
			try {
				window.localStorage.setItem(storageViewKey, mode);
			} catch (error) {
				
			}
			updateSearchResults();
		}

		try {
			const savedView = window.localStorage.getItem(storageViewKey);
			if (savedView === "list" || savedView === "grid") {
				applyView(savedView);
			}
		} catch (error) {
			
		}

		toggleButtons.forEach((button) => {
			button.addEventListener("click", () => {
				applyView(button.dataset.viewMode || "grid");
			});
		});

		if (searchInput) {
			searchInput.addEventListener("input", updateSearchResults);
			searchInput.addEventListener("keydown", (event) => {
				if (event.key !== "Enter") {
					return;
				}
				const targetHref = grid ? grid.dataset.firstVisibleHref : "";
				if (!targetHref) {
					return;
				}
				event.preventDefault();
				window.location.assign(targetHref);
			});
		}

		if (searchClear) {
			searchClear.addEventListener("click", () => {
				if (!searchInput) {
					return;
				}
				searchInput.value = "";
				updateSearchResults();
				searchInput.focus();
			});
		}

		applyView((grid && grid.dataset.view) || "grid");
		updateSearchResults();

		links.forEach((link) => {
			link.addEventListener("click", (event) => {
				if (
					prefersReducedMotion.matches ||
					event.defaultPrevented ||
					event.button !== 0 ||
					event.metaKey ||
					event.ctrlKey ||
					event.shiftKey ||
					event.altKey
				) {
					return;
				}

				const href = link.getAttribute("href");
				if (!href || href.startsWith("#")) {
					return;
				}

				event.preventDefault();
				if (isLeaving) {
					return;
				}

				isLeaving = true;
				document.body.classList.add("home-transitioning");
				link.classList.add("is-opening");
				window.setTimeout(() => {
					window.location.assign(href);
				}, 240);
			});
		});
	})();
</script>
