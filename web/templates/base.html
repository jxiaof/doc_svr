{{ define "site_head" }}
<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ .MetaTitle }}</title>
	<meta name="description" content="{{ .MetaDescription }}">
	<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v={{ .AssetVersion }}">
	<link rel="stylesheet" href="/assets/site.css?v={{ .AssetVersion }}">
</head>
<body{{ if .BodyClass }} class="{{ .BodyClass }}"{{ end }}>
	<div class="page-shell{{ if .ShellClass }} {{ .ShellClass }}{{ end }}">
		{{ if not .HideHeader }}
		<header class="site-header">
			<div class="site-header-tools" style="flex:1; justify-content:flex-start;">
				<a class="brand-block brand-home" href="/">
					<span class="brand">{{ .Site.Name }}</span>
				</a>
			</div>
			<div class="site-header-tools" style="flex:2; justify-content:center;">
				<label class="site-search" aria-label="搜索页面入口" data-home-search-shell>
					<span class="site-search-icon" aria-hidden="true"></span>
					<input class="site-search-input" type="search" placeholder="搜索路由或页面名称" autocomplete="off" spellcheck="false" data-home-search-input>
					<button class="site-search-clear" type="button" aria-label="清空搜索" data-home-search-clear hidden>
						<span class="site-search-clear-icon" aria-hidden="true"></span>
					</button>
				</label>
			</div>
			<div class="site-header-tools" style="flex:1; justify-content:flex-end;">
				<button class="theme-toggle" type="button" aria-label="切换深色/浅色模式" data-theme-toggle title="切换主题">
					<span class="theme-toggle-icon" aria-hidden="true"></span>
				</button>
			</div>
		</header>
		{{ end }}
		<main class="page-main">
{{ end }}

{{ define "site_footer" }}
		</main>
		{{ if not .HideFooter }}
		<footer class="site-footer">
					<div class="footer-inner">
						<div class="footer-title">{{ .Site.Name }}</div>
						<div class="footer-desc">{{ .Site.Description }}</div>
					</div>
				</footer>
		{{ end }}
	</div>
</body>
</html>
{{ end }}
